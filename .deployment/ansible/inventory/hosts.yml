---
# Ansible Inventory for GoComponents PR Preview Server
# Run locally on the server as root or with sudo

all:
  hosts:
    localhost:
      ansible_connection: local
      ansible_python_interpreter: /usr/bin/python3

  vars:
    # Domain configuration
    server_hostname: dc2devgopolib01.corp.tangoe.com
    
    # SSL configuration
    ssl_certificate_path: /etc/ssl/certs/dc2devgopolib01.corp.tangoe.com.crt
    ssl_certificate_key_path: /etc/ssl/private/dc2devgopolib01.corp.tangoe.com.key
