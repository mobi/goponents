<!-- External Link -->
@if (externalLink) {
  <a
    class="go-panel"
    [target]="target ? target : '_blank'"
    [rel]="target ? target : 'noreferrer'"
    [ngClass]="panelClasses()"
    [attr.href]="externalLink"
    (click)="panelClicked()">
    <span class="go-panel__title">
      @if (icon) {
        <span class="go-panel__icon material-icons">{{icon}}</span>
      }
      <span class="go-panel__title-text" [innerHtml]="panelContent"></span>
    </span>
  </a>
} @else {
  <button
    class="go-panel"
    [disabled]="disablePanel"
    [ngClass]="panelClasses()"
    (click)="handleAction()">
    <span class="go-panel__title">
      @if (icon) {
        <span
          class="go-panel__icon material-icons">
          {{icon}}
        </span>
      }
      @if (panelContent) {
        <span
          class="go-panel__title-text"
          [innerHtml]="panelContent">
        </span>
      }
      @if (!panelContent) {
        <ng-content></ng-content>
      }
    </span>
  </button>
}

<!-- No External Link -->
