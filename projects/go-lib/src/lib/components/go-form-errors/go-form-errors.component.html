@if (errors && !errors.length && (control.dirty || control.touched)) {
  <div>
    @for (error of errors | keyvalue; track error) {
      <go-hint
        [message]="errorString(error.key, error.value)"
        [theme]="theme"
        type="negative">
      </go-hint>
    }
  </div>
}

<!--
This is the old approach and is deprecated,
support for errors as an array will eventually be dropped.
-->
@if (control?.errors?.length) {
  <div>
    @for (error of control.errors; track error) {
      <go-hint
        [message]="error.message"
        [label]="error.type"
        [theme]="theme"
        type="negative">
      </go-hint>
    }
  </div>
}
