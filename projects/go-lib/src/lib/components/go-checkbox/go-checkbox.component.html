<div>
  <label
    [for]="_id"
    class="go-form__label go-form__label--inline go-form__label--checkbox-container"
    [ngClass]="{ 'go-form__label--dark': theme === 'dark' }"
    >
    {{ label }}
    <go-required-text [control]="control"></go-required-text>
    <input
      [id]="_id"
      class="go-form__checkbox go-form__checkbox--hidden"
      [ngClass]="{ 'go-form__checkbox--dark': theme === 'dark' }"
      type="checkbox"
      [formControl]="control"
      #hiddenInputRef
      />
      <span
        class="go-form__custom-checkbox"
        [ngClass]="{ 'go-form__custom-checkbox--dark': theme === 'dark' }"
      ></span>
    </label>

    @for (hint of hints; track hint) {
      <go-hint
        [message]="hint"
        [theme]="theme"
      ></go-hint>
    }
    @if (!hideFieldError) {
      <div>
        <go-form-errors [control]="control"></go-form-errors>
      </div>
    }
  </div>
