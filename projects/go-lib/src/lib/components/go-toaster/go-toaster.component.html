<!-- Here is where we make toast -->
@if (goToasterService.toasts) {
  <div
    class="go-toaster">
    @for (toast of goToasterService.toasts; track toast; let i = $index) {
      <div
        @toastAnimation
        class="go-toaster__item">
        <go-toast
          [dismissable]="toast.dismissable"
          [header]="toast.header"
          [message]="toast.message"
          (mouseover)="pauseTimers()"
          (mouseout)="restartTimers()"
          (handleDismiss)="dismissToast(i)"
          [type]="toast.type">
        </go-toast>
      </div>
    }
  </div>
}
