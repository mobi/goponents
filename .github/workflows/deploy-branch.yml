# GoComponents Branch Deployment Workflow
# Deploys main branch to root, dev branch to /dev/, manual dispatch to /custom/

name: Deploy Branch

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && 'custom' || github.ref_name }}
  cancel-in-progress: true

env:
  DEPLOY_SERVER: ${{ secrets.DEPLOY_SERVER_HOST }}
  DEPLOY_USER: ${{ secrets.DEPLOY_SERVER_USER }}

jobs:
  deploy:
    name: Deploy ${{ github.event_name == 'workflow_dispatch' && 'Custom' || github.ref_name }} Branch
    runs-on: ubuntu-latest
    
    steps:
      - name: Set deployment variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy_path=/var/www/goponents/custom" >> $GITHUB_OUTPUT
            echo "base_href=/custom/" >> $GITHUB_OUTPUT
            echo "url_path=/custom" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "deploy_path=/var/www/goponents/main" >> $GITHUB_OUTPUT
            echo "base_href=/" >> $GITHUB_OUTPUT
            echo "url_path=" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            echo "deploy_path=/var/www/goponents/dev" >> $GITHUB_OUTPUT
            echo "base_href=/dev/" >> $GITHUB_OUTPUT
            echo "url_path=/dev" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Node Modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: ./node_modules
          key: ${{ github.ref_name }}-npm-${{ hashFiles('package-lock.json') }}

      - name: Read .nvmrc
        run: echo "NVMRC=$(cat .nvmrc)" >> $GITHUB_ENV

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NVMRC }}

      - name: Install Dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build Style Guide
        run: |
          npm run style_guide_publish -- --base-href=${{ steps.vars.outputs.base_href }}
        env:
          CI: true

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_USER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.DEPLOY_SERVER }} >> ~/.ssh/known_hosts

      - name: Deploy to Server
        run: |
          # Create deployment directory if not exists
          ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_SERVER }} \
            "mkdir -p ${{ steps.vars.outputs.deploy_path }}"
          
          # Sync built files to server
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/go-style-guide/ \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_SERVER }}:${{ steps.vars.outputs.deploy_path }}/
          
          # Set proper permissions
          ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_SERVER }} \
            "chmod -R 755 ${{ steps.vars.outputs.deploy_path }}"

      - name: Deployment Summary
        run: |
          echo "## ✅ ${{ github.ref_name }} Branch Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://${{ env.DEPLOY_SERVER }}${{ steps.vars.outputs.url_path }}/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Deployed at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")_" >> $GITHUB_STEP_SUMMARY
