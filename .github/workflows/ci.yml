name: CI

on: [pull_request]

concurrency:
  group: ci_${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  library:
    name: Library Build & Tests
    runs-on: [self-hosted, oracle9, gomobilesharedstagedeploy]
    steps:
      - uses: actions/checkout@v4

      - name: Cache Node Modules
        id: cache-node-modules
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          path: ./node_modules
          key: library-npm-${{ hashFiles('package-lock.json') }}

      - name: Read .nvmrc
        run: echo NVMRC=`cat .nvmrc` >> $GITHUB_ENV

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NVMRC }}

      - name: Install npm Packages
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Trivy Security Scan
        uses: ./.github/actions/trivy_security_scan
        with:
          services_dashboard_url: ${{ vars.SERVICES_DASHBOARD_URL }}
          vuln_fail_severities: ${{ vars.TRIVY_VULN_FAIL_SEVERITIES }}
          license_fail_severities: ${{ vars.TRIVY_LICENSE_FAIL_SEVERITIES }}

      - name: Run Production Build
        run: npm run build_lib

      - name: Run Tests
        run: npm run test_lib:ci
